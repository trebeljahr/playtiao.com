# Local "prod-parity" stack for verifying Dockerfile changes and
# Traefik routing quirks without running full Coolify locally.
#
# Layers on top of `docker-compose.dev.yml` — run both files together
# so Mongo / Redis / MinIO come along with the client + server + Traefik
# containers you actually want to exercise:
#
#   npm run dev:docker            # starts the whole stack
#   npm run dev:docker:stop       # clean shutdown
#   npm run dev:docker:rebuild    # force image rebuild (after Dockerfile edits)
#
# Hostnames: `playtiao.localhost` and `api.playtiao.localhost`.
# RFC 6761 reserves `*.localhost` for loopback, so modern browsers
# and resolvers (Chrome, Firefox, Safari, getaddrinfo on Linux glibc
# 2.26+) auto-map these to 127.0.0.1 with NO `/etc/hosts` edit.
# If your OS is old enough to miss that RFC (ancient macOS, vanilla
# Windows without the "localhost" suffix rule), fall back to adding
# `127.0.0.1 playtiao.localhost api.playtiao.localhost` to hosts.
#
# Prereqs:
#
#   1. Docker Desktop (or OrbStack / Colima) running.
#
#   2. Ports 80 and 8080 free on localhost. 80 is Traefik's HTTP
#      entrypoint; 8080 is the Traefik dashboard for debugging
#      routing rules (http://localhost:8080/dashboard/).
#
# After `npm run dev:docker`:
#
#   http://playtiao.localhost/              → the client (via the Next.js
#                                              production server baked
#                                              into client/Dockerfile)
#   http://api.playtiao.localhost/api/...   → the Express backend
#   http://api.playtiao.localhost/ws/...    → WebSocket (tournaments, matches)
#   http://localhost:8080/dashboard/        → Traefik routing dashboard
#
# What this DOES NOT give you:
#
#   - TLS. Local HTTPS would need mkcert + trust-store setup — not
#     worth the complexity for a Dockerfile-regression smoke test.
#     If you need to verify TLS-specific behaviour (secure cookies,
#     Strict-Transport-Security), set up a real staging VPS with a
#     public DNS entry.
#
#   - Hot reload. The client Dockerfile produces a production-baked
#     Next.js build — no HMR, no watch, every source change requires
#     a full image rebuild. That's on purpose: this flow mirrors the
#     real deployment image, not the dev loop. For fast inner-loop
#     iteration, keep using `npm run dev` or `npm run dev:desktop`.

services:
  traefik:
    image: traefik:v3.1
    container_name: tiao-dev-traefik
    restart: unless-stopped
    command:
      # API + dashboard (insecure=true means no auth, fine for localhost only)
      - --api=true
      - --api.dashboard=true
      - --api.insecure=true
      # Auto-discover containers via docker labels
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=tiao-traefik
      # Single entrypoint on port 80 (no TLS locally)
      - --entrypoints.web.address=:80
      # Access log is noisy but useful when debugging routing
      - --accesslog=true
      - --log.level=INFO
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      # Read-only socket mount — Traefik queries Docker for labels,
      # never spawns containers of its own.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tiao-traefik

  tiao-client:
    image: tiao-dev-client:latest
    build:
      context: .
      dockerfile: ./client/Dockerfile
      args:
        # Build-time NEXT_PUBLIC_* vars baked into the JS bundle.
        # All optional — values here are dev-only placeholders; the
        # real values live in Coolify's build-arg tab for production.
        APP_VERSION: dev-docker
        NEXT_PUBLIC_API_BASE_URL: http://api.playtiao.localhost
        NEXT_PUBLIC_WS_URL: ws://api.playtiao.localhost
    container_name: tiao-dev-client
    restart: unless-stopped
    depends_on:
      - tiao-server
    environment:
      NODE_ENV: production
      # The Next.js custom server (client/server.mjs) proxies /api and
      # /ws to the backend. In this compose file Traefik already
      # routes them directly to tiao-server via the api.playtiao.localhost
      # host, so the client's internal proxy is exercised only on
      # same-origin requests — if any exist.
      API_URL: http://tiao-server:80
    labels:
      - "traefik.enable=true"
      # HTTP router on the bare playtiao.localhost host.
      - "traefik.http.routers.tiao-client.rule=Host(`playtiao.localhost`)"
      - "traefik.http.routers.tiao-client.entrypoints=web"
      - "traefik.http.routers.tiao-client.service=tiao-client"
      - "traefik.http.services.tiao-client.loadbalancer.server.port=80"
    networks:
      - default
      - tiao-traefik

  tiao-server:
    image: tiao-dev-server:latest
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: tiao-dev-server
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
      - minio
    environment:
      NODE_ENV: production
      PORT: "80"
      # The infra services are on the default docker-compose network
      # (shared with docker-compose.dev.yml).  Compose resolves them
      # by service name.
      MONGODB_URI: mongodb://mongo:27017/tiao
      REDIS_URL: redis://redis:6379
      # MinIO for S3-compatible uploads.  These match the creds baked
      # into docker-compose.dev.yml.
      S3_BUCKET_NAME: tiao-dev
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_URL: http://playtiao.localhost/minio
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      # better-auth session secret.  Dev-only placeholder.  If you
      # want to test OAuth flows, put real GITHUB_CLIENT_* etc. in a
      # `.env.docker` file and docker-compose will pick them up.
      TOKEN_SECRET: dev-docker-token-secret-not-for-production
      # Prod CORS + cookie base URL — matches the Traefik Host rule.
      FRONTEND_URL: http://playtiao.localhost
    env_file:
      # Optional per-machine overrides (OAuth creds, GlitchTip DSN, etc.).
      # Create `.env.docker` in the repo root and it's picked up
      # automatically.  The file is git-ignored via `**/.env*`.
      - path: .env.docker
        required: false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tiao-server.rule=Host(`api.playtiao.localhost`)"
      - "traefik.http.routers.tiao-server.entrypoints=web"
      - "traefik.http.routers.tiao-server.service=tiao-server"
      - "traefik.http.services.tiao-server.loadbalancer.server.port=80"
    networks:
      - default
      - tiao-traefik

networks:
  # The `default` network is created automatically by compose and
  # carries the infra containers from docker-compose.dev.yml.
  # `tiao-traefik` is a dedicated network that Traefik watches for
  # labels — isolating it from the default network prevents Traefik
  # from accidentally exposing Mongo / Redis / MinIO to the outside
  # world through a stray label misconfiguration.
  tiao-traefik:
    driver: bridge
